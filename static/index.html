<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food3D — AI-Powered Food to 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Three.js - Stable UMD Versions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: rgba(22, 22, 35, 0.9);
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --text: #f0f0f5;
            --text-dim: #8888a0;
            --gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 3rem; }
        .header h1 { font-size: 2.5rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .main-grid { display: grid; grid-template-columns: 400px 1fr; gap: 2rem; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(20px); overflow: hidden; }
        .card-header { padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 0.8rem; }
        .card-body { padding: 1.5rem; }

        .upload-zone { border: 2px dashed rgba(108, 92, 231, 0.3); border-radius: 12px; padding: 3rem 1rem; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .upload-zone:hover { border-color: var(--accent); background: rgba(255,255,255,0.02); }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .preview-section { margin-top: 1.5rem; display: none; }
        .preview-section.active { display: block; }
        .preview-wrapper { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .preview-wrapper img { width: 100%; height: 200px; object-fit: cover; }

        .btn-generate { width: 100%; margin-top: 1rem; padding: 1rem; background: var(--gradient); border: none; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
        .btn-generate:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 20px var(--accent-glow); }
        .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-gallery { width: 100%; margin-top: 0.8rem; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-weight: 600; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: 0.3s; }
        .btn-gallery:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

        .viewer-card { display: flex; flex-direction: column; min-height: 550px; }
        .viewer-container { flex: 1; min-height: 450px; background: #000; position: relative; }
        #three-canvas { width: 100%; height: 100%; display: block; }

        .status-section { margin-top: 1.5rem; display: none; }
        .status-section.active { display: block; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--gradient); width: 0%; transition: width 0.3s; }
        .progress-fill.indeterminate { width: 30% !important; animation: slide 1.5s infinite; }
        @keyframes slide { from { transform: translateX(-100%); } to { transform: translateX(400%); } }

        .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 1000; pointer-events: none; }
        .toast { background: #1a1a2e; border: 1px solid var(--accent); padding: 1rem 1.5rem; border-radius: 12px; color: #fff; margin-bottom: 0.5rem; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div style="display:flex; justify-content:center; align-items:center; gap:1rem; margin-bottom:0.5rem;">
                <div style="width:50px; height:50px; background:var(--gradient); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.5rem;">🍕</div>
                <h1>Food3D</h1>
            </div>
            <p style="color:var(--text-dim);">The Future of Food Marketing: Picture to 3D instantly</p>
        </header>

        <div class="main-grid">
            <div class="upload-panel">
                <div class="card">
                    <div class="card-header"><h2>📸 New Generation</h2></div>
                    <div class="card-body">
                        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                            <span style="font-size:3rem;">🖼️</span>
                            <p>Drop photo here or Click</p>
                            <input type="file" id="fileInput" accept="image/*">
                        </div>

                        <div class="preview-section" id="previewSection">
                            <div class="preview-wrapper"><img id="previewImage" src=""></div>
                        </div>

                        <button class="btn-generate" id="generateBtn" disabled>✨ Generate 3D Model</button>
                        <a href="/gallery" class="btn-gallery">🏛️ My 3D Library</a>

                        <div class="status-section" id="statusSection">
                            <p id="statusLabel" style="font-size:0.9rem; font-weight:600;">Processing...</p>
                            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                            <p id="statusDetails" style="font-size:0.75rem; color:var(--text-dim);">Sending image...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card viewer-card">
                <div class="card-header"><h2>🧊 3D Preview</h2></div>
                <div class="viewer-container" id="viewerContainer">
                    <canvas id="three-canvas"></canvas>
                    <div id="viewerPlaceholder" style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-dim); pointer-events:none;">
                        <span style="font-size:3rem; opacity:0.1;">📦</span>
                        <p>Object will appear here</p>
                    </div>
                </div>
                <div style="padding:1rem; border-top:1px solid rgba(255,255,255,0.05); text-align:center;">
                    <button id="downloadBtn" style="display:none; padding:0.7rem 1.5rem; background:#00cec9; border:none; border-radius:8px; font-weight:700; cursor:pointer;">⬇ Download .GLB</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusSection = document.getElementById('statusSection');
        const progressFill = document.getElementById('progressFill');
        const statusLabel = document.getElementById('statusLabel');
        const statusDetails = document.getElementById('statusDetails');
        const downloadBtn = document.getElementById('downloadBtn');
        const viewerPlaceholder = document.getElementById('viewerPlaceholder');

        let selectedFile = null;
        let scene, camera, renderer, controls, currentModel;

        function init3D() {
            const container = document.getElementById('viewerContainer');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(2, 2, 2);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 2.0));
            const dl = new THREE.DirectionalLight(0xffffff, 2.5);
            dl.position.set(5, 10, 5);
            scene.add(dl);

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        function loadModel(url) {
            if (currentModel) scene.remove(currentModel);
            const loader = new THREE.GLTFLoader();
            loader.load(url, (gltf) => {
                currentModel = gltf.scene;
                currentModel.traverse(n => { if(n.isMesh) { n.material.vertexColors = true; n.material.needsUpdate = true; } });
                
                const box = new THREE.Box3().setFromObject(currentModel);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                const scale = 2.2 / Math.max(size.x, size.y, size.z);

                currentModel.scale.setScalar(scale);
                currentModel.position.set(-center.x*scale, (-center.y*scale) + (size.y*scale/2), -center.z*scale);
                scene.add(currentModel);

                controls.target.set(0, size.y*scale/2, 0);
                viewerPlaceholder.style.display = 'none';
                showToast('🚀 3D Model Ready!', 'success');
            }, undefined, (e) => console.error(e));
        }

        fileInput.onchange = (e) => {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                document.getElementById('previewImage').src = URL.createObjectURL(selectedFile);
                document.getElementById('previewSection').classList.add('active');
                generateBtn.disabled = false;
            }
        };

        generateBtn.onclick = async () => {
            if (!selectedFile) return;
            generateBtn.disabled = true;
            statusSection.classList.add('active');
            progressFill.style.width = '0%';
            progressFill.classList.add('indeterminate');
            
            const fd = new FormData();
            fd.append('file', selectedFile);
            
            try {
                const res = await fetch('/generate-3d/', { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.status === 'completed' || data.is_cached) {
                    onFinish(data.job_id);
                } else {
                    startPolling(data.job_id);
                }
            } catch (err) {
                showToast('Server error!', 'error');
                generateBtn.disabled = false;
            }
        };

        function startPolling(id) {
            const timer = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${id}`);
                    const data = await res.json();
                    statusDetails.textContent = `Status: ${data.status}...`;
                    if (data.status === 'completed') {
                        clearInterval(timer);
                        onFinish(id);
                    } else if (data.status === 'failed') {
                        clearInterval(timer);
                        showToast('Generation failed.', 'error');
                        generateBtn.disabled = false;
                    }
                } catch (e) { clearInterval(timer); }
            }, 3000);
        }

        function onFinish(id) {
            progressFill.classList.remove('indeterminate');
            progressFill.style.width = '100%';
            statusLabel.textContent = 'DONE!';
            loadModel(`/model/${id}`);
            downloadBtn.style.display = 'inline-block';
            downloadBtn.onclick = () => window.location.href = `/model/${id}`;
            generateBtn.disabled = false;
        }

        function showToast(m, t) {
            const toast = document.createElement('div');
            toast.className = `toast ${t}`;
            toast.textContent = m;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        init3D();

        // Auto-load last completed
        setTimeout(async () => {
            try {
                const res = await fetch('/jobs');
                const data = await res.json();
                if (data.jobs && data.jobs.length > 0) {
                    const last = data.jobs[0];
                    if (last.status === 'completed') loadModel(`/model/${last.job_id}`);
                }
            } catch(e) {}
        }, 1000);
    </script>
</body>
</html>
